<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>博客后台管理</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5; color: #333;
    }
    .login-page {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 2rem;
    }
    .login-card {
      background: #fff; border-radius: 8px; padding: 2.5rem 2rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08); width: 420px; max-width: 100%;
    }
    .login-card h1 { font-size: 1.4rem; margin-bottom: 0.3rem; }
    .login-card p { color: #666; font-size: 0.9rem; margin-bottom: 1.5rem; line-height: 1.5; }
    label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.4rem; color: #444; }
    input[type="password"], input[type="text"] {
      width: 100%; padding: 0.7rem 0.8rem; font-size: 0.9rem;
      border: 1px solid #d9d9d9; border-radius: 6px; outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #1890ff; box-shadow: 0 0 0 2px rgba(24,144,255,0.15); }
    .btn {
      width: 100%; padding: 0.7rem; font-size: 0.95rem; font-weight: 600;
      border: none; border-radius: 6px; cursor: pointer; margin-top: 1rem;
      background: #1890ff; color: #fff; transition: background 0.2s;
    }
    .btn:hover { background: #096dd9; }
    .btn:disabled { background: #91caff; cursor: not-allowed; }
    .error { color: #ff4d4f; font-size: 0.85rem; margin-top: 0.5rem; display: none; }
    .success { color: #52c41a; font-size: 0.85rem; margin-top: 0.5rem; display: none; }
    .hint { font-size: 0.8rem; color: #999; margin-top: 0.3rem; }
    .hidden { display: none; }
    #spinner { display: none; text-align: center; padding: 3rem; }
    .loader { border: 3px solid #f0f0f0; border-top: 3px solid #1890ff; border-radius: 50%; width: 32px; height: 32px; animation: spin 0.8s linear infinite; margin: 1rem auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .step { margin-bottom: 1rem; font-size: 0.85rem; color: #666; }
    .step code { background: #f5f5f5; padding: 0.1rem 0.3rem; border-radius: 3px; font-size: 0.8rem; }
  </style>
</head>
<body>
  <!-- Login page -->
  <div id="loginPage" class="login-page">
    <div class="login-card">
      <h1>博客后台管理</h1>
      <p>使用 GitHub Token 登录<br>Token 仅保存在浏览器本地，不会上传到其他服务器</p>

      <label for="tokenInput">GitHub Personal Access Token</label>
      <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" autocomplete="off" />
      <div class="hint">需要 <code>repo</code> 和 <code>workflow</code> 权限</div>
      <div id="errorMsg" class="error"></div>
      <div id="successMsg" class="success"></div>

      <button id="loginBtn" class="btn" onclick="login()">登录</button>

      <div class="step" style="margin-top:1.5rem;padding-top:1rem;border-top:1px solid #f0f0f0">
        <strong>如何获取 Token：</strong><br>
        1. 打开 <a href="https://github.com/settings/tokens" target="_blank">github.com/settings/tokens</a><br>
        2. 点 <strong>Generate new token (classic)</strong><br>
        3. 勾选 <code>repo</code> 和 <code>workflow</code> 权限<br>
        4. 生成后复制 token 粘贴到上方输入框
      </div>
    </div>
  </div>

  <!-- Loading screen -->
  <div id="spinner" class="login-page">
    <div style="text-align:center">
      <div class="loader"></div>
      <div style="color:#666;font-size:0.9rem">正在加载编辑器...</div>
    </div>
  </div>

  <script>
    // Check if already logged in
    const savedToken = localStorage.getItem('github_token');
    if (savedToken) {
      showLoader();
      loadCMS(savedToken);
    }

    function login() {
      const token = document.getElementById('tokenInput').value.trim();
      const errorEl = document.getElementById('errorMsg');
      const successEl = document.getElementById('successMsg');
      errorEl.style.display = 'none';
      successEl.style.display = 'none';

      if (!token || !token.startsWith('ghp_')) {
        errorEl.textContent = '请输入有效的 GitHub Token（以 ghp_ 开头）';
        errorEl.style.display = 'block';
        return;
      }

      // Verify token
      fetch('https://api.github.com/user', {
        headers: { 'Authorization': 'token ' + token }
      })
      .then(r => {
        if (!r.ok) throw new Error('Token 无效或权限不足');
        return r.json();
      })
      .then(user => {
        successEl.textContent = '验证通过！欢迎 ' + user.login;
        successEl.style.display = 'block';
        localStorage.setItem('github_token', token);
        document.getElementById('loginBtn').disabled = true;
        setTimeout(() => { showLoader(); loadCMS(token); }, 800);
      })
      .catch(err => {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
      });
    }

    function showLoader() {
      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('spinner').style.display = 'flex';
    }

    function loadCMS(token) {
      // Store token for Decap CMS GitHub backend
      // Decap CMS reads token from various localStorage keys
      localStorage.setItem('github-auth-token', token);
      localStorage.setItem('decap-cms-github-token', token);
      localStorage.setItem('github_token', token);

      // Create CMS script
      const script = document.createElement('script');
      script.src = 'https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js';
      script.onload = function() {
        // Auth is already handled by the stored tokens
        console.log('Decap CMS loaded');
      };
      document.body.appendChild(script);
    }
  </script>
</body>
</html>
