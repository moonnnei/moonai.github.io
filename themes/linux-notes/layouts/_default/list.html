{{ define "main" }}
<h1 style="font-size:1.5rem;font-weight:700;margin-bottom:1.5rem;">{{ .Title }}</h1>
<ul class="post-list">
  {{ range .Pages }}
  <li class="post-item">
    <div class="post-date">{{ .Date.Format "2006-01-02" }}</div>
    <div class="post-title"><a href="{{ .RelPermalink }}">{{ .Title }}</a></div>
    {{ if .Params.summary }}<div class="post-summary">{{ .Params.summary }}</div>{{ end }}
  </li>
  {{ else }}
  <li class="post-item"><p style="color:var(--fg-dim);">这里还没有内容。</p></li>
  {{ end }}
</ul>
{{ end }}
