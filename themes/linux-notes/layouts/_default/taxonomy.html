{{ define "main" }}
<h1 style="font-size:1.5rem;font-weight:700;margin-bottom:0.5rem;">{{ .Title }}</h1>
<p style="color:var(--fg-muted);margin-bottom:1.5rem;">所有标签，点击查看相关文章。</p>
<div class="taxonomy-list">
  {{ range .Pages }}
  <a href="{{ .RelPermalink }}" class="taxonomy-item">{{ .Title }} ({{ len .Pages }})</a>
  {{ end }}
</div>
{{ end }}
