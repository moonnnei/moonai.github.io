{{ define "main" }}
<h1 style="font-size:1.5rem;font-weight:700;margin-bottom:0.5rem;">标签：{{ .Title }}</h1>
<p style="color:var(--fg-muted);margin-bottom:1.5rem;">共 {{ len .Pages }} 篇文章</p>
<ul class="post-list">
  {{ range .Pages }}
  <li class="post-item">
    <div class="post-date">{{ .Date.Format "2006-01-02" }}</div>
    <div class="post-title"><a href="{{ .RelPermalink }}">{{ .Title }}</a></div>
  </li>
  {{ end }}
</ul>
{{ end }}
